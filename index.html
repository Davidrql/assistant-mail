<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MailCorrect — Assistant Rédaction</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --ink: #1a1410; --paper: #f5f0e8; --cream: #ede8db; --gold: #c4a44a; --rust: #b85c3a; --sage: #5a7a5c; --muted: #8a8070; --border: #d4c9b0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; }
  header { padding: 28px 40px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 16px; background: rgba(245,240,232,0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 600; color: var(--ink); }
  .logo span { color: var(--gold); }
  .tagline { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); font-weight: 300; }
  main { flex: 1; display: grid; grid-template-columns: 1fr 1fr; max-width: 1400px; margin: 0 auto; width: 100%; }
  .panel { padding: 36px 40px; display: flex; flex-direction: column; gap: 20px; }
  .panel-left { border-right: 1px solid var(--border); }
  .panel-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; gap: 10px; }
  .panel-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  textarea { width: 100%; height: 320px; background: rgba(255,255,255,0.5); border: 1px solid var(--border); boder-radius: 4px; padding: 20px; font-family: 'DM Sans', sans-serif; font-size: 15px; line-height: 1.7; color: var(--ink); resize: none; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
  textarea:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(196,164,74,0.1); }
  textarea::placeholder { color: var(--muted); font-style: italic; font-size: 14px; }
  .mic-row { display: flex; align-items: center; gap: 12px; }
  .btn-mic { display: flex; align-items: center; gap: 8px; padding: 10px 18px; background: white; border: 1px solid var(--border); border-radius: 100px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); transition: all 0.2s; }
  .btn-mic:hover { border-color: var(--gold); background: var(--cream); }
  .btn-mic.recording { border-color: var(--rust); background: #fff5f3; color: var(--rust); animation: pulse-border 1.2s infinite; }
  @keyframes pulse-border { 0%, 100% { box-shadow: 0 0 0 0 rgba(184,92,58,0.3); } 50% { box-shadow: 0 0 0 6px rgba(184,92,58,0); } }
  .mic-icon { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; }
  .mic-dot { width: 8px; height: 8px; background: var(--rust); border-radius: 50%; animation: blink 1s infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
  .char-count { margin-left: auto; font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn { padding: 12px 22px; border-radius: 4px; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.3px; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
  .btn-primary { background: var(--ink); color: var(--paper); }
  .btn-primary:hover { background: #2d2520; transform: translateY(-1px); }
  .btn-secondary { background: transparent; color: var(--ink); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--gold); background: var(--cream); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
  .btn-icon { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; }
  .mode-selector { display: flex; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; background: white; }
  .mode-btn { flex: 1; padding: 10px 14px; border: none; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--muted); transition: all 0.18s; border-right: 1px solid var(--border); }
  .mode-btn:last-child { border-right: none; }
  .mode-btn.active { background: var(--ink); color: white; }
  .mode-btn:not(.active):hover { background: var(--cream); color: var(--ink); }
  .tone-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .tone-chip { padding: 6px 14px; border-radius: 100px; border: 1px solid var(--border); background: white; font-size: 12px; cursor: pointer; color: var(--muted); transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
  .tone-chip.active { border-color: var(--gold); color: var(--gold); background: #fffbf0; }
  .output-box { flex: 1; min-height: 320px; background: rgba(255,255,255,0.6); border: 1px solid var(--border); border-radius: 4px; padding: 20px; font-size: 15px; line-height: 1.7; color: var(--ink); position: relative; overflow-y: auto; }
  .output-placeholder { color: var(--muted); font-style: italic; font-size: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; text-align: center; }
  .output-placeholder svg { opacity: 0.3; }
  .output-content { white-space: pre-wrap; }
  .loading-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--gold), var(--rust), var(--gold)); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 0 0 4px 4px; }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  .output-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-copy { padding: 8px 16px; background: transparent; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--muted); transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
  .btn-copy:hover { border-color: var(--sage); color: var(--sage); }
  .btn-copy.copied { border-color: var(--sage); color: var(--sage); background: #f0f7f0; }
  .subject-row { display: flex; gap: 10px; align-items: center; }
  .subject-label { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; white-space: nowrap; }
  .subject-input { flex: 1; padding: 8px 14px; border: 1px solid var(--border); border-radius: 4px; font-family: 'DM Sans', sans-serif; font-size: 13px; background: white; color: var(--ink); outline: none; transition: border-color 0.2s; }
  .subject-input:focus { border-color: var(--gold); }
  .speech-unsupported { font-size: 11px; color: var(--rust); font-style: italic; }
  .divider { height: 1px; background: var(--border); margin: 4px 0; }
  footer { padding: 16px 40px; border-top: 1px solid var(--border); display: flex; justify-content: center; gap: 8px; font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; letter-spacing: 1px; }
  @media (max-width: 900px) { main { grid-template-columns: 1fr; } .panel-left { border-right: none; border-bottom: 1px solid var(--border); } header { padding: 20px 24px; } .panel { padding: 28px 24px; } footer { padding: 16px 24px; } }
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--ink); color: white; padding: 12px 24px; border-radius: 100px; font-size: 13px; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index: 1000; pointer-events: none; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">Mail<span>Correct</span></div>
  <div class="tagline">Assistant rédaction IA — David Roquelin</div>
</header>

<main>
  <div class="panel panel-left">
    <div class="panel-label">Votre texte</div>
    <div>
      <div class="mode-selector">
        <button class="mode-btn active" data-mode="correct">✏️ Correction orthographe</button>
        <button class="mode-btn" data-mode="email">✉️ Rédiger un mail</button>
        <button class="mode-btn" data-mode="improve">✨ Améliorer le style</button>
      </div>
    </div>
    <div class="subject-row" id="subjectRow" style="display:none">
      <span class="subject-label">Objet :</span>
      <input class="subject-input" id="subjectInput" type="text" placeholder="Ex: Demande de devis, Suivi de commande…">
    </div>
    <div id="toneRow" style="display:none">
      <div class="panel-label" style="margin-bottom:10px">Ton souhaité</div>
      <div class="tone-row">
        <button class="tone-chip active" data-tone="professionnel">Professionnel</button>
        <button class="tone-chip" data-tone="cordial">Cordial</button>
        <button class="tone-chip" data-tone="formel">Formel</button>
        <button class="tone-chip" data-tone="amical">Amical</button>
        <button class="tone-chip" data-tone="persuasif">Persuasif</button>
      </div>
    </div>
    <div class="text-area-wrapper">
      <textarea id="inputText" placeholder="Collez votre texte ici, ou dictez-le avec le micro…&#10;&#10;Ex: je vodrais savoir si vous avez recus ma demande concernant le devis…"></textarea>
    </div>
    <div class="mic-row">
      <button class="btn-mic" id="micBtn" title="Dicter">
        <svg class="mic-icon" viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0014 0M12 19v3M9 22h6"/></svg>
        <span id="micLabel">Dicter</span>
      </button>
      <div id="micDot" style="display:none" class="mic-dot"></div>
      <span id="speechUnsupported" class="speech-unsupported" style="display:none">Micro non supporté par ce navigateur</span>
      <span class="char-count" id="charCount">0 car.</span>
    </div>
    <div class="divider"></div>
    <div class="actions">
      <button class="btn btn-primary" id="processBtn">
        <svg class="btn-icon" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        Lancer l'analyse
      </button>
      <button class="btn btn-secondary" id="clearBtn">
        <svg class="btn-icon" viewBox="0 0 24 24"><path d="M3 6h18M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/></svg>
        Vider
      </button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-label">Résultat corrigé</div>
    <div class="output-box" id="outputBox">
      <div class="output-placeholder" id="outputPlaceholder">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/>
        </svg>
        <div>Votre texte corrigé<br>apparaîtra ici</div>
      </div>
    </div>
    <div class="output-actions">
      <button class="btn-copy" id="copyBtn" style="display:none">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        Copier le texte
      </button>
      <button class="btn-copy" id="useAsInputBtn" style="display:none">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
        Utiliser comme entrée
      </button>
    </div>
  </div>
</main>

<footer>
  <span>MailCorrect</span>
  <span>·</span>
  <span>Propulsé par Claude AI</span>
</footer>

<div class="toast" id="toast"></div>

<script>
let currentMode = 'correct';
let currentTone = 'professionnel';
let outputText = '';
let recognition = null;
let isRecording = false;

const inputText = document.getElementById('inputText');
const outputBox = document.getElementById('outputBox');
const processBtn = document.getElementById('processBtn');
const clearBtn = document.getElementById('clearBtn');
const copyBtn = document.getElementById('copyBtn');
const useAsInputBtn = document.getElementById('useAsInputBtn');
const micBtn = document.getElementById('micBtn');
const micDot = document.getElementById('micDot');
const micLabel = document.getElementById('micLabel');
const charCount = document.getElementById('charCount');
const subjectRow = document.getElementById('subjectRow');
const toneRow = document.getElementById('toneRow');
const subjectInput = document.getElementById('subjectInput');

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    const isEmail = currentMode === 'email';
    subjectRow.style.display = isEmail ? 'flex' : 'none';
    toneRow.style.display = isEmail ? 'block' : 'none';
    const placeholder = {
      correct: 'Collez votre texte ici, ou dictez-le avec le micro…',
      email: 'Décrivez ce que vous voulez dire dans votre mail…',
      improve: 'Collez votre texte à améliorer…'
    };
    inputText.placeholder = placeholder[currentMode];
  });
});

document.querySelectorAll('.tone-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.tone-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentTone = chip.dataset.tone;
  });
});

inputText.addEventListener('input', () => { charCount.textContent = inputText.value.length + ' car.'; });

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SpeechRecognition) {
  micBtn.style.display = 'none';
  document.getElementById('speechUnsupported').style.display = 'inline';
} else {
  let finalTranscript = '';
  function startRecognition() {
    recognition = new SpeechRecognition();
    recognition.lang = 'fr-FR';
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.onstart = () => { isRecording = true; micBtn.classList.add('recording'); micLabel.textContent = 'Arrêter'; micDot.style.display = 'inline-block'; };
    recognition.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript + ' ';
        else interim += e.results[i][0].transcript;
      }
      inputText.value = finalTranscript + interim;
      charCount.textContent = inputText.value.length + ' car.';
    };
    recognition.onerror = (e) => {
      let msg = 'Erreur micro.';
      if (e.error === 'not-allowed') msg = '🔒 Permission micro refusée. Autorisez le micro dans votre navigateur.';
      else if (e.error === 'no-speech') msg = 'Aucune parole détectée, réessayez.';
      showToast(msg); stopRecognition();
    };
    recognition.onend = () => { if (isRecording) { try { recognition.start(); } catch(e) { stopRecognition(); } } };
    try { recognition.start(); } catch(e) { showToast('Impossible de démarrer le micro : ' + e.message); }
  }
  function stopRecognition() {
    isRecording = false; micBtn.classList.remove('recording'); micLabel.textContent = 'Dicter'; micDot.style.display = 'none';
    if (recognition) { recognition.onend = null; try { recognition.stop(); } catch(e) {} }
  }
  micBtn.addEventListener('click', () => {
    if (!isRecording) { finalTranscript = inputText.value.trim(); if (finalTranscript) finalTranscript += ' '; startRecognition(); }
    else stopRecognition();
  });
}

clearBtn.addEventListener('click', () => { inputText.value = ''; charCount.textContent = '0 car.'; resetOutput(); });

function resetOutput() {
  outputBox.innerHTML = '<div class="output-placeholder"><svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg><div>Votre texte corrigé<br>apparaîtra ici</div></div>';
  copyBtn.style.display = 'none'; useAsInputBtn.style.display = 'none'; outputText = '';
}

processBtn.addEventListener('click', async () => {
  const text = inputText.value.trim();
  if (!text) { showToast("Veuillez saisir ou dicter du texte d'abord."); return; }
  processBtn.disabled = true;
  processBtn.innerHTML = '<svg class="btn-icon" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg> Analyse en cours…';
  outputBox.innerHTML = '<div style="color:var(--muted);font-style:italic;padding:8px">Analyse en cours…</div><div class="loading-bar"></div>';
  copyBtn.style.display = 'none'; useAsInputBtn.style.display = 'none';
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': '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', 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-ipc': 'true' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: buildSystemPrompt(), messages: [{ role: 'user', content: buildUserPrompt(text) }] })
    });
    const data = await response.json();
    const result = data.content?.[0]?.text || '';
    outputText = result;
    outputBox.innerHTML = '<div class="output-content">' + escapeHtml(result) + '</div>';
    copyBtn.style.display = 'flex'; useAsInputBtn.style.display = 'flex';
  } catch (err) {
    outputBox.innerHTML = '<div style="color:var(--rust);padding:8px">❌ Erreur : ' + err.message + '</div>';
  }
  processBtn.disabled = false;
  processBtn.innerHTML = '<svg class="btn-icon" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg> Lancer l'analyse';
});

function buildSystemPrompt() {
  if (currentMode === 'correct') return "Tu es un correcteur orthographique expert en français. Corrige les fautes d'orthographe, de grammaire et de ponctuation. Conserve le sens et la structure. Réponds directement avec le texte corrigé.";
  if (currentMode === 'email') {
    const subject = subjectInput.value.trim();
    return "Tu es un expert en rédaction de mails professionnels en français. Rédige un mail complet et structuré. Ton souhaité : " + currentTone + ". " + (subject ? 'Objet : "' + subject + '".' : '') + " Inclus une formule d'ouverture, le corps et une formule de clôture. Réponds directement avec le mail.";
  }
  return "Tu es un expert en rédaction et style en français. Améliore le style, la clarté et la fluidité. Réponds directement avec le texte amélioré.";
}

function buildUserPrompt(text) {
  if (currentMode === 'correct') return 'Texte à corriger :

' + text;
  if (currentMode === 'email') return 'Idées pour le mail :

' + text;
  return 'Texte à améliorer :

' + text;
}

copyBtn.addEventListener('click', () => {
  if (!outputText) return;
  navigator.clipboard.writeText(outputText).then(() => {
    copyBtn.textContent = '✓ Copié !'; copyBtn.classList.add('copied');
    setTimeout(() => { copyBtn.innerHTML = '<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copier le texte'; copyBtn.classList.remove('copied'); }, 2000);
  });
});

useAsInputBtn.addEventListener('click', () => {
  inputText.value = outputText; charCount.textContent = outputText.length + ' car.'; resetOutput();
  showToast('Texte transféré dans la zone de saisie.'); inputText.scrollIntoView({ behavior: 'smooth' });
});

function escapeHtml(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showToast(msg) {
  const toast = document.getElementById('toast'); toast.textContent = msg; toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2800);
}
</script>
</body>
</html>
